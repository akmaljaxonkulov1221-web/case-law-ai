# Render Configuration for Case-Law AI Platform

services:
  # Frontend Service (Next.js)
  - type: web
    name: case-law-ai-frontend
    env: static
    buildCommand: npm run build
    startCommand: npm start
    staticPublishDir: .next
    nodeVersion: 18
    envVars:
      - key: NEXT_PUBLIC_API_URL
        value: https://case-law-ai-backend.onrender.com
      - key: NEXT_PUBLIC_WS_URL
        value: wss://case-law-ai-backend.onrender.com
      - key: NEXT_PUBLIC_APP_NAME
        value: Case-Law AI Platform
      - key: NEXT_PUBLIC_APP_VERSION
        value: 1.0.0
      - key: NEXT_PUBLIC_ENVIRONMENT
        value: production
      - key: NODE_ENV
        value: production
      - key: NEXT_TELEMETRY_DISABLED
        value: 1

  # Backend Service (FastAPI)
  - type: web
    name: case-law-ai-backend
    runtime: python
    buildCommand: cd ai-core && pip install -r requirements.txt
    startCommand: cd ai-core && gunicorn app.main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:8000 --timeout 300
    pythonVersion: 3.11
    envVars:
      # Database Configuration
      - key: DATABASE_URL
        sync: false
      - key: POSTGRES_PASSWORD
        generateValue: true
      - key: POSTGRES_USER
        value: caselaw_user
      - key: POSTGRES_DB
        value: caselaw_ai
      - key: DATABASE_POOL_SIZE
        value: 20
      - key: DATABASE_MAX_OVERFLOW
        value: 30
      
      # Redis Configuration
      - key: REDIS_URL
        sync: false
      - key: REDIS_PASSWORD
        generateValue: true
      
      # AI Services
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4-turbo-preview
      - key: OPENAI_MAX_TOKENS
        value: 4000
      - key: OPENAI_TEMPERATURE
        value: 0.1
      
      # Security Configuration
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: JWT_ACCESS_TOKEN_EXPIRE_MINUTES
        value: 30
      - key: JWT_REFRESH_TOKEN_EXPIRE_DAYS
        value: 7
      - key: SECRET_KEY
        generateValue: true
      - key: ALGORITHM
        value: HS256
      
      # Application Configuration
      - key: APP_NAME
        value: Case-Law AI Platform
      - key: APP_VERSION
        value: 1.0.0
      - key: DEBUG
        value: false
      - key: LOG_LEVEL
        value: INFO
      - key: ENVIRONMENT
        value: production
      
      # RAG Configuration
      - key: RAG_TOP_K
        value: 5
      - key: RAG_SCORE_THRESHOLD
        value: 0.7
      - key: RAG_MAX_CONTEXT_LENGTH
        value: 4000
      
      # Rate Limiting
      - key: RATE_LIMIT_REQUESTS
        value: 100
      - key: RATE_LIMIT_WINDOW
        value: 3600
      
      # File Upload
      - key: MAX_FILE_SIZE
        value: 10485760
      - key: ALLOWED_FILE_TYPES
        value: pdf,doc,docx,txt
      
      # CORS Configuration
      - key: CORS_ORIGINS
        value: https://case-law-ai-frontend.onrender.com,https://case-law-ai.onrender.com

# PostgreSQL Database
databases:
  - name: caselaw-ai-db
    databaseName: caselaw_ai
    user: caselaw_user

# Redis Cache
redis:
  - name: caselaw-ai-redis
    ipAllowList: []  # Allow all connections from services
